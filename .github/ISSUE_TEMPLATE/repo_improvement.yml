name: Repository improvement
description: Propose a repository-level improvement such as better navigation, community files, or maintenance automation.
title: "[Repo]: "
body:
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What repository improvement do you want to see?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Why it helps
      description: Explain the problem this change would solve.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Repository landing page
        - Docs structure
        - Contribution workflow
        - Issue / PR templates
        - Build guide
        - Other
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints or notes
      description: Mention rights, attribution, or scope concerns if relevant.
